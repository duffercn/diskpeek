name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name diskpeek diskpeek.py
          # Smoke-test: binary must exist and be executable
          test -x dist/diskpeek

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/diskpeek
          generate_release_notes: true
